name: CI

on:
  pull_request:
    branches: [main, pre-release]
  push:
    branches: [main, pre-release]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IBM_TELEMETRY_DISABLED: 'true'
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

jobs:
  # Repo-wide safety nets that the per-workspace `turbo` tasks in `quality`
  # do not reach. Independent of build/test, so it runs in parallel.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-node-env

      # Regression guard: every workspace must define a `lint` script, else
      # `turbo run lint` silently skips it (how esm-styleguide hid 14 errors).
      - name: Validate Lint Coverage
        run: yarn validate:lint-coverage

      - name: Validate Global Route Registration Names
        run: yarn validate:route-names

      - name: Validate Workspace Launch Targets
        run: yarn validate:workspace-routes

      # Repo-wide regression tests cover error exposure, route registration,
      # release/E2E safety and the assembled SPA serving contract.
      - name: Test Tooling
        run: yarn test:tooling

      - name: Validate Error Exposure
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            yarn validate:error-exposure --base "origin/${{ github.base_ref }}" --head "${{ github.sha }}"
          else
            yarn validate:error-exposure --base "${{ github.event.before }}" --head "${{ github.sha }}"
          fi

      # Safety net: lints the whole repo (incl. non-workspace files like
      # packages/tooling/scripts and root configs) that per-package turbo
      # lint does not reach. Fails on lint errors only, not warnings.
      - name: Lint Full Repo
        run: yarn lint:all

      # e2e is not a workspace, so `turbo run typescript` never typechecks it.
      # Enforce the root suite (e2e/tests), which is type-clean. The modular
      # suites (e2e/<module>) carry ~196 pre-existing type errors and are not
      # yet in scope — see docs/e2e-testing.md.
      - name: Typecheck E2E (root suite)
        run: yarn typecheck:e2e

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-node-env

      # Wipes generated artifacts (incl. .turbo) before restoring the Turbo
      # cache, so the cache restore below is what seeds .turbo — not stale
      # local output.
      - name: Clean generated artifacts
        run: yarn clean

      - name: Turbo Cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Quality Scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            {
              echo "Running changed-workspace verification against origin/${{ github.base_ref }}"
              echo "- mode: changed workspaces"
              echo "- base: origin/${{ github.base_ref }}"
              echo "- head: ${{ github.sha }}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "Running full monorepo verification on push to main"
              echo "- mode: full verify"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify Changed Workspaces
        if: github.event_name == 'pull_request'
        run: yarn verify:changed --base origin/${{ github.base_ref }} --head ${{ github.sha }}

      - name: Verify Full Monorepo
        if: github.event_name == 'push'
        run: yarn verify

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    needs: quality
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-node-env

      - name: Turbo Cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build
        run: yarn build

      # `yarn build` above already built the apps, so assemble only packages
      # the importmap and validates the artifact — no rebuild. (package:spa
      # would re-run `turbo run build` on the apps; `yarn assemble` skips it.)
      - name: Assemble and validate SPA artifact
        run: yarn assemble

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-node-env

      - name: Security Audit
        run: yarn npm audit --all --recursive --severity high
