name: E2E

# Playwright e2e suite (e2e/tests). Unlike the rest of CI, this needs a
# reachable OpenMRS backend and login credentials to pass — global-setup.ts
# logs in and writes e2e/storage-state.json. Until those are configured as
# repo secrets/vars (see the `env:` block below), keep this OUT of the
# required checks and run it on demand or per-PR via the `e2e` label.
#
# To make it run on every push to main, uncomment the `push:` trigger once the
# secrets exist.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]
    branches: [main]
  # push:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IBM_TELEMETRY_DISABLED: 'true'
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'
  # SPA + backend the suite points at (repo Variables).
  E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
  E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
  E2E_LOGIN_DEFAULT_LOCATION_UUID: ${{ vars.E2E_LOGIN_DEFAULT_LOCATION_UUID }}
  # Login used by global-setup.ts (repo Secrets).
  E2E_USER_ADMIN_USERNAME: ${{ secrets.E2E_USER_ADMIN_USERNAME }}
  E2E_USER_ADMIN_PASSWORD: ${{ secrets.E2E_USER_ADMIN_PASSWORD }}

jobs:
  e2e:
    # Only run for push/dispatch, or for PRs explicitly labeled `e2e`.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-env

      - name: Install Playwright browser (chromium)
        run: yarn playwright install --with-deps chromium

      - name: Build apps
        run: yarn build:apps

      # Playwright's webServer config starts `yarn start` and waits for the
      # login page before running the suite.
      - name: Run E2E tests
        run: yarn test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
