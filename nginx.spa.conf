server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /openmrs/spa {
    return 301 /openmrs/spa/;
  }

  location ~ ^/openmrs/spa/(?<asset>(?:index\.html|importmap\.json|routes\.registry\.json|frontend\.json|build-info\.json))$ {
    alias /usr/share/nginx/html/$asset;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location ~ ^/openmrs/spa/(?<asset>(?:openmrs|sihsalus)-esm-[^/]+\.js)$ {
    alias /usr/share/nginx/html/$asset;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location ~ ^/openmrs/spa/(?<asset>[^/]+\.[a-f0-9]{8,}\.(?:js|css|json|ico|png|svg|woff2?))$ {
    alias /usr/share/nginx/html/$asset;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /openmrs/spa/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /openmrs {
    return 301 /openmrs/;
  }

  location /openmrs/ {
    proxy_pass http://backend:8080/openmrs/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    return 302 /openmrs/spa/;
  }
}
