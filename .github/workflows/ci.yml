name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: HUSKY=0 yarn install --immutable

      - name: Clean generated artifacts
        run: yarn clean

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Quality Scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Running changed-workspace verification against origin/${{ github.base_ref }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- mode: changed workspaces" >> "$GITHUB_STEP_SUMMARY"
            echo "- base: origin/${{ github.base_ref }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- head: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Running full monorepo verification on push to main" >> "$GITHUB_STEP_SUMMARY"
            echo "- mode: full verify" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify Changed Workspaces
        if: github.event_name == 'pull_request'
        run: yarn verify:changed --base origin/${{ github.base_ref }} --head ${{ github.sha }}

      - name: Verify Full Monorepo
        if: github.event_name == 'push'
        run: yarn verify

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: HUSKY=0 yarn install --immutable

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Build
        run: yarn build

  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: HUSKY=0 yarn install --immutable

      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Assemble and validate SPA artifact
        run: yarn package:spa

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install dependencies
        run: HUSKY=0 yarn install --immutable

      - name: Security Audit
        run: yarn npm audit --severity high
