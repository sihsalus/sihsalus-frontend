services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && yarn install --immutable --immutable-cache --check-cache && yarn build:apps && yarn assemble && yarn start"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8080:8080"
      - "8081-8090:8081-8090"
    environment:
      - SIHSALUS_BACKEND_URL=${SIHSALUS_BACKEND_URL:-http://gidis-hsc-dev.inf.pucp.edu.pe}
      - SIHSALUS_AUTH_MODE=openmrs
      - SIHSALUS_INTERNAL_CLI_PORT=8081
      - YARN_ENABLE_NETWORK=0
