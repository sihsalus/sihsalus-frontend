name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, pre-release]
  push:
    tags: ['sihsalus-v*']

concurrency:
  group: release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  IBM_TELEMETRY_DISABLED: 'true'
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success') ||
      startsWith(github.ref, 'refs/tags/sihsalus-v')
    environment:
      name: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'pre-release' && 'frontend-pre-release' || 'frontend-production' }}
    permissions:
      actions: read
      contents: write
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          # A workflow_run executes in the default-branch context. Pin the
          # checkout to the exact CI commit so a later push cannot change the
          # source that is published under the immutable commit tag.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Validate release source
        id: source
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          CI_EVENT: ${{ github.event.workflow_run.event }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          CI_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            if [[ "${CI_EVENT}" != "push" ]]; then
              echo "::error::Releases require a successful CI run triggered by a branch push."
              exit 1
            fi

            case "${BRANCH_NAME}" in
              main|pre-release) ;;
              *)
                echo "::error::Unexpected release branch."
                exit 1
                ;;
            esac

            if [[ "${CI_REPOSITORY}" != "${GITHUB_REPOSITORY}" || "${CI_SHA}" != "${RELEASE_SHA}" ]]; then
              echo "::error::The successful CI run does not match this repository and checked-out commit."
              exit 1
            fi

            git fetch --no-tags origin "refs/heads/${BRANCH_NAME}:refs/remotes/origin/${BRANCH_NAME}"
            CURRENT_SHA="$(git rev-parse "refs/remotes/origin/${BRANCH_NAME}")"
            if [[ "${RELEASE_SHA}" != "${CURRENT_SHA}" ]]; then
              echo "::error::Refusing to build a stale branch commit."
              exit 1
            fi
            SOURCE_BRANCH="${BRANCH_NAME}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            if [[ ! "${TAG_NAME}" =~ ^sihsalus-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "::error::Release tags must exactly match sihsalus-vMAJOR.MINOR.PATCH."
              exit 1
            fi

            git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "${RELEASE_SHA}" refs/remotes/origin/main; then
              echo "::error::Release tags must point to a commit contained in main."
              exit 1
            fi
            SOURCE_BRANCH="tag"
          fi

          {
            echo "branch=${SOURCE_BRANCH}"
            echo "sha=${RELEASE_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Require successful CI for tagged commit
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          SUCCESSFUL_RUNS="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${RELEASE_SHA}&status=completed&per_page=100" \
              --jq '[.workflow_runs[] | select(.conclusion == "success" and .event == "push" and .head_branch == "main")] | length'
          )"
          if [[ "${SUCCESSFUL_RUNS}" -lt 1 ]]; then
            echo "::error::The tagged commit has no successful completed CI push run on main."
            exit 1
          fi

      # Derive build provenance from git. A `sihsalus-vX.Y.Z` tag supplies the exact
      # release version; branch builds use package.json and fall back to a SHA-based
      # development version only when package metadata is unavailable.
      - name: Compute version
        id: version
        run: |
          GIT_SHA="${{ steps.source.outputs.sha }}"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(git show -s --format=%cI HEAD)"
          PACKAGE_VERSION="$(node -p "require('./package.json').version" 2>/dev/null || true)"
          if [[ "${GITHUB_REF}" == refs/tags/sihsalus-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/sihsalus-v}"
            if [[ -z "${PACKAGE_VERSION}" || "${VERSION}" != "${PACKAGE_VERSION}" ]]; then
              echo "::error::Release tag version ${VERSION} must exactly match package.json version ${PACKAGE_VERSION:-<missing>}."
              exit 1
            fi
          elif [[ -n "${PACKAGE_VERSION}" ]]; then
            VERSION="${PACKAGE_VERSION}"
          else
            DESC="$(git describe --tags --match 'sihsalus-v*' --always 2>/dev/null || echo '')"
            if [[ "${DESC}" == sihsalus-v* ]]; then
              VERSION="${DESC#sihsalus-v}"
            else
              VERSION="0.0.0-dev+${SHA_SHORT}"
            fi
          fi
          MAJOR_MINOR="$(printf '%s' "${VERSION}" | grep -oE '^[0-9]+\.[0-9]+' || true)"
          {
            echo "version=${VERSION}"
            echo "major_minor=${MAJOR_MINOR}"
            echo "git_sha=${GIT_SHA}"
            echo "sha_short=${SHA_SHORT}"
            echo "build_time=${BUILD_TIME}"
          } >> "${GITHUB_OUTPUT}"
          echo "Resolved version=${VERSION} sha=${SHA_SHORT}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/sihsalus/sihsalus-frontend
          tags: |
            type=raw,value=sha-${{ steps.version.outputs.git_sha }}
            type=raw,value=latest,enable=${{ steps.source.outputs.branch == 'main' }}
            type=raw,value=next,enable=${{ steps.source.outputs.branch == 'pre-release' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.source.outputs.branch == 'tag' }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.source.outputs.branch == 'tag' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: secure-init
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ steps.version.outputs.git_sha }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,scope=release-amd64,mode=max

      - name: Revalidate branch tip before publishing
        if: github.event_name == 'workflow_run'
        env:
          BRANCH_NAME: ${{ steps.source.outputs.branch }}
          RELEASE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          git fetch --no-tags origin "refs/heads/${BRANCH_NAME}:refs/remotes/origin/${BRANCH_NAME}"
          CURRENT_SHA="$(git rev-parse "refs/remotes/origin/${BRANCH_NAME}")"
          if [[ "${RELEASE_SHA}" != "${CURRENT_SHA}" ]]; then
            echo "::error::The branch advanced during build; refusing to promote a stale image."
            exit 1
          fi

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect immutable commit image
        id: immutable
        env:
          IMMUTABLE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ steps.version.outputs.git_sha }}
        run: |
          set +e
          INSPECT_OUTPUT="$(docker buildx imagetools inspect "${IMMUTABLE_IMAGE}" --format '{{.Manifest.Digest}}' 2>&1)"
          INSPECT_STATUS=$?
          set -e
          if [[ "${INSPECT_STATUS}" -eq 0 ]]; then
            if [[ ! "${INSPECT_OUTPUT}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::The existing commit image has an invalid registry digest."
              exit 1
            fi
            {
              echo "exists=true"
              echo "digest=${INSPECT_OUTPUT}"
              echo "scan_ref=${IMMUTABLE_IMAGE}@${INSPECT_OUTPUT}"
            } >> "${GITHUB_OUTPUT}"
            echo "Reusing immutable commit image ${IMMUTABLE_IMAGE}@${INSPECT_OUTPUT}"
            exit 0
          fi
          if ! grep -Eqi 'not found|manifest unknown' <<< "${INSPECT_OUTPUT}"; then
            echo "::error::Could not inspect the immutable commit image in the registry."
            exit 1
          fi
          {
            echo "exists=false"
            echo "digest="
            echo "scan_ref=${IMMUTABLE_IMAGE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Scan exact image before publishing or promotion
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.immutable.outputs.scan_ref }}
          format: sarif
          output: trivy-release-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy scan
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-release-results.sarif') != '' }}
        with:
          sarif_file: trivy-release-results.sarif

      - name: Publish immutable commit image
        if: steps.immutable.outputs.exists != 'true'
        env:
          IMMUTABLE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ steps.version.outputs.git_sha }}
        run: |
          docker push "${IMMUTABLE_IMAGE}"

      - name: Resolve immutable image digest
        id: published
        env:
          IMMUTABLE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ steps.version.outputs.git_sha }}
        run: |
          PUBLISHED_DIGEST="$(docker buildx imagetools inspect "${IMMUTABLE_IMAGE}" --format '{{.Manifest.Digest}}')"
          if [[ ! "${PUBLISHED_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::The registry did not return a valid digest for the published commit image."
            exit 1
          fi
          if [[ "${{ steps.immutable.outputs.exists }}" == "true" && "${PUBLISHED_DIGEST}" != "${{ steps.immutable.outputs.digest }}" ]]; then
            echo "::error::The immutable commit tag changed after registry inspection."
            exit 1
          fi
          echo "digest=${PUBLISHED_DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Promote verified image aliases
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMMUTABLE_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ steps.version.outputs.git_sha }}
          IMMUTABLE_SOURCE: ghcr.io/sihsalus/sihsalus-frontend@${{ steps.published.outputs.digest }}
          PUBLISHED_DIGEST: ${{ steps.published.outputs.digest }}
          SOURCE_BRANCH: ${{ steps.source.outputs.branch }}
          VERSION_IMAGE: ghcr.io/sihsalus/sihsalus-frontend:${{ steps.version.outputs.version }}
        run: |
          while IFS= read -r image_tag; do
            if [[ -z "${image_tag}" || "${image_tag}" == "${IMMUTABLE_IMAGE}" ]]; then
              continue
            fi

            if [[ "${SOURCE_BRANCH}" == "tag" && "${image_tag}" == "${VERSION_IMAGE}" ]]; then
              set +e
              VERSION_INSPECT="$(docker buildx imagetools inspect "${image_tag}" --format '{{.Manifest.Digest}}' 2>&1)"
              VERSION_STATUS=$?
              set -e
              if [[ "${VERSION_STATUS}" -eq 0 ]]; then
                if [[ "${VERSION_INSPECT}" != "${PUBLISHED_DIGEST}" ]]; then
                  echo "::error::The exact release version already points to a different image digest: ${image_tag}"
                  exit 1
                fi
                echo "Exact release version already points to the verified digest: ${image_tag}"
                continue
              fi
              if ! grep -Eqi 'not found|manifest unknown' <<< "${VERSION_INSPECT}"; then
                echo "::error::Could not inspect the exact release version in the registry: ${image_tag}"
                exit 1
              fi
            fi

            docker buildx imagetools create --tag "${image_tag}" "${IMMUTABLE_SOURCE}"
            PROMOTED_DIGEST="$(docker buildx imagetools inspect "${image_tag}" --format '{{.Manifest.Digest}}')"
            if [[ "${PROMOTED_DIGEST}" != "${PUBLISHED_DIGEST}" ]]; then
              echo "::error::Promoted alias does not resolve to the verified digest: ${image_tag}"
              exit 1
            fi
          done <<< "${IMAGE_TAGS}"

      # This repository currently has no verified deployment receiver. Record the
      # immutable, scanned artifact without claiming that production was promoted.
      - name: Record immutable published artifact
        env:
          IMAGE_TAG: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ steps.version.outputs.git_sha }}
          IMAGE_DIGEST: ghcr.io/sihsalus/sihsalus-frontend@${{ steps.published.outputs.digest }}
          RELEASE_SHA: ${{ steps.version.outputs.git_sha }}
        run: |
          {
            echo "### Published frontend artifact"
            echo "- Commit tag: \`${IMAGE_TAG}\`"
            echo "- Deployment image: \`${IMAGE_DIGEST}\`"
            echo "- Commit: \`${RELEASE_SHA}\`"
            echo "- Deployment: not performed by this workflow"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Release (on tags)
        if: steps.source.outputs.branch == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
