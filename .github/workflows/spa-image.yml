name: SPA Image

on:
  pull_request:
    paths:
      - 'packages/apps/**'
      - 'packages/libs/**'
      - 'Dockerfile'
      - 'nginx.spa.conf'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-spa-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/sihsalus/sihsalus-frontend
          tags: |
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build SPA image (amd64 only — verification)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: spa-nginx
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,scope=release-amd64,mode=max
