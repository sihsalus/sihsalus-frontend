name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, pre-release]
  push:
    tags: ['sihsalus-v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      startsWith(github.ref, 'refs/tags/sihsalus-v')
    permissions:
      contents: write
      packages: write
      security-events: write
    env:
      HAS_DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Derive build provenance from git. On a `sihsalus-vX.Y.Z` tag the version is
      # exact; on branch builds it is `git describe` relative to the last such tag
      # (e.g. 1.2.0-5-gabc1234), falling back to a dev placeholder.
      - name: Compute version
        id: version
        run: |
          SHA_SHORT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF}" == refs/tags/sihsalus-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/sihsalus-v}"
          else
            DESC="$(git describe --tags --match 'sihsalus-v*' --always 2>/dev/null || echo '')"
            if [[ "${DESC}" == sihsalus-v* ]]; then
              VERSION="${DESC#sihsalus-v}"
            else
              VERSION="0.0.0-dev+${SHA_SHORT}"
            fi
          fi
          MAJOR_MINOR="$(printf '%s' "${VERSION}" | grep -oE '^[0-9]+\.[0-9]+' || true)"
          {
            echo "version=${VERSION}"
            echo "major_minor=${MAJOR_MINOR}"
            echo "sha_short=${SHA_SHORT}"
            echo "build_time=${BUILD_TIME}"
          } >> "${GITHUB_OUTPUT}"
          echo "Resolved version=${VERSION} sha=${SHA_SHORT}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/sihsalus/sihsalus-frontend
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main' }}
            type=raw,value=next,enable=${{ github.ref == 'refs/heads/pre-release' || github.event.workflow_run.head_branch == 'pre-release' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/sihsalus-v') }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ startsWith(github.ref, 'refs/tags/sihsalus-v') }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: secure-init
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ steps.version.outputs.sha_short }}
            BUILD_TIME=${{ steps.version.outputs.build_time }}
          cache-from: type=gha,scope=release-amd64
          cache-to: type=gha,scope=release-amd64,mode=max

      - name: Scan published image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/sihsalus/sihsalus-frontend:sha-${{ github.sha }}
          format: sarif
          output: trivy-release-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy scan
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-release-results.sarif') != '' }}
        with:
          sarif_file: trivy-release-results.sarif

      - name: Notify sihsalus deployment
        if: >
          (github.event.workflow_run.head_branch == 'main' || github.ref == 'refs/heads/main') &&
          env.HAS_DEPLOY_TOKEN == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: sihsalus/sihsalus-frontend
          event-type: frontend-published
          client-payload: '{"image":"ghcr.io/sihsalus/sihsalus-frontend:latest","sha":"${{ github.sha }}"}'

      - name: Create GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/sihsalus-v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
