name: E2E

# Playwright smoke suite (e2e/tests). It exercises the already-deployed synthetic
# environment; the separate Build apps step validates the PR source but does not
# make that build available at E2E_BASE_URL.
# The `e2e-nonprod` environment must require approval of the exact commit.
# Keep this OUT of required checks until that protected environment exists.
#
# To make it run on every push to main, uncomment the `push:` trigger once the
# secrets exist.
on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]
    branches: [main]
  # push:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IBM_TELEMETRY_DISABLED: "true"
  TURBO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

jobs:
  e2e:
    name: Synthetic environment smoke (external deployment)
    # Only run for push/dispatch, or for PRs explicitly labeled `e2e`.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: e2e-nonprod
    permissions:
      contents: read
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
      E2E_LOGIN_DEFAULT_LOCATION_UUID: ${{ vars.E2E_LOGIN_DEFAULT_LOCATION_UUID }}
      E2E_PATIENT_UUID: ${{ vars.E2E_PATIENT_UUID }}
      E2E_APPOINTMENTS_PATIENT_UUID: ${{ vars.E2E_APPOINTMENTS_PATIENT_UUID }}
      E2E_ALLOWED_HOSTS: ${{ vars.E2E_ALLOWED_HOSTS }}
      E2E_TARGET_KIND: ${{ vars.E2E_TARGET_KIND }}
      # Be explicit: this job does not serve or claim to exercise the PR artifact.
      E2E_DISABLE_WEB_SERVER: "true"
    steps:
      - name: Validate E2E configuration
        shell: bash
        run: |
          required_variables=(
            E2E_BASE_URL
            E2E_API_BASE_URL
            E2E_LOGIN_DEFAULT_LOCATION_UUID
            E2E_PATIENT_UUID
            E2E_APPOINTMENTS_PATIENT_UUID
            E2E_ALLOWED_HOSTS
            E2E_TARGET_KIND
          )
          missing_variables=()

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name:-}" ]]; then
              missing_variables+=("${variable_name}")
            fi
          done

          if (( ${#missing_variables[@]} > 0 )); then
            echo "::error::E2E environment is not configured. Missing: ${missing_variables[*]}"
            exit 1
          fi

          node <<'NODE'
          const fail = (message) => {
            console.error(`::error::${message}`);
            process.exitCode = 1;
          };
          const allowedHosts = new Set(
            process.env.E2E_ALLOWED_HOSTS.split(',').map((host) => host.trim().toLowerCase()).filter(Boolean),
          );

          if (process.env.E2E_TARGET_KIND !== 'synthetic-nonprod') {
            fail('E2E_TARGET_KIND must be exactly synthetic-nonprod. Production or real clinical data is forbidden.');
          }
          if (allowedHosts.size === 0) fail('E2E_ALLOWED_HOSTS must contain at least one exact hostname.');

          for (const variableName of ['E2E_BASE_URL', 'E2E_API_BASE_URL']) {
            try {
              const url = new URL(process.env[variableName]);
              if (url.protocol !== 'https:') fail(`${variableName} must use HTTPS.`);
              if (url.username || url.password || url.hash) fail(`${variableName} must not contain credentials or a fragment.`);
              if (!allowedHosts.has(url.hostname.toLowerCase())) {
                fail(`${variableName} host is not present in E2E_ALLOWED_HOSTS.`);
              }
            } catch {
              fail(`${variableName} must be a valid absolute URL.`);
            }
          }

          for (const variableName of [
            'E2E_LOGIN_DEFAULT_LOCATION_UUID',
            'E2E_PATIENT_UUID',
            'E2E_APPOINTMENTS_PATIENT_UUID',
          ]) {
            const value = process.env[variableName];
            if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(value)) {
              fail(`${variableName} must be a valid UUID.`);
            }
          }
          NODE

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-node-env

      - name: Install Playwright browser (chromium)
        run: yarn playwright install --with-deps chromium

      - name: Build checked-out ref apps (static gate, not the external smoke target)
        run: yarn build:apps

      - name: Run synthetic environment smoke
        env:
          # Secrets are deliberately unavailable to checkout, install and build.
          # Configure a synthetic, minimum-privilege account in e2e-nonprod.
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          if [[ -z "${E2E_USERNAME}" || -z "${E2E_PASSWORD}" ]]; then
            echo "::error::The protected E2E account is not configured."
            exit 1
          fi
          yarn test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
